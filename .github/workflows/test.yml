name: Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: windows-2022

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: .deps
        key: deps-${{ hashFiles('src/CMakeLists.txt') }}

    - name: Configure CMake
      run: cmake -G "Visual Studio 17 2022" -A x64 -B build -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.deps

    - name: Build
      run: cmake --build build --config ${{ matrix.configuration }}

    - name: Run tests
      run: build/src/Tests/${{ matrix.configuration }}/Tests.exe

    - name: Upload build artifacts
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: profiler-artifacts-x64
        path: |
          src/reference/dd-win-prof.dll
          src/reference/dd-win-prof.lib
          src/reference/dd-win-prof.pdb
          src/reference/datadog_profiling_ffi.dll
          src/reference/datadog_profiling_ffi.pdb
          build/src/ProfilerInjector/${{ matrix.configuration }}/ProfilerInjector.exe
          build/src/ProfilerInjector/${{ matrix.configuration }}/ProfilerInjector.pdb
          build/src/Runner/${{ matrix.configuration }}/Runner.exe
          build/src/Runner/${{ matrix.configuration }}/Runner.pdb
          build/src/Tests/${{ matrix.configuration }}/Tests.exe
        retention-days: 7

  e2e-tests:
    needs: test
    if: success()
    uses: ./.github/workflows/e2e.yml
