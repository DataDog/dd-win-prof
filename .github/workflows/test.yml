name: Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: windows-2022

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Cache dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: .deps
        key: deps-${{ hashFiles('src/CMakeLists.txt') }}

    - name: Configure CMake
      run: cmake -G "Visual Studio 17 2022" -A x64 -B build -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.deps

    - name: Build
      run: cmake --build build --config ${{ matrix.configuration }}

    - name: Run tests
      run: build/src/Tests/${{ matrix.configuration }}/Tests.exe

    - name: Setup Python
      if: matrix.configuration == 'Release'
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      if: matrix.configuration == 'Release'
      run: pip install -r src/integration-tests/requirements.txt

    - name: Run integration tests
      if: matrix.configuration == 'Release'
      run: pwsh src/integration-tests/test_rum_scenario.ps1 -Config Release
      shell: pwsh

    - name: Upload build artifacts
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: profiler-artifacts-x64
        path: |
          src/reference/dd-win-prof.dll
          src/reference/dd-win-prof.lib
          src/reference/dd-win-prof.pdb
          src/reference/datadog_profiling_ffi.dll
          src/reference/datadog_profiling_ffi.pdb
          build/src/ProfilerInjector/${{ matrix.configuration }}/ProfilerInjector.exe
          build/src/ProfilerInjector/${{ matrix.configuration }}/ProfilerInjector.pdb
          build/src/Runner/${{ matrix.configuration }}/Runner.exe
          build/src/Runner/${{ matrix.configuration }}/Runner.pdb
          build/src/Tests/${{ matrix.configuration }}/Tests.exe
        retention-days: 7

  e2e-tests:
    needs: test
    if: success()
    uses: ./.github/workflows/e2e.yml
