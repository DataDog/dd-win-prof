name: Obfuscation Tools Build and Test

on:
  push:
    branches: [ main ]
    paths:
      - 'obfuscation/**'
      - '.github/workflows/obfuscation.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'obfuscation/**'
      - '.github/workflows/obfuscation.yml'
  workflow_dispatch:

jobs:
  build-obfuscation:
    runs-on: windows-2022

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Cache dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: .deps
        key: deps-${{ hashFiles('src/CMakeLists.txt') }}

    - name: Configure CMake
      run: cmake -G "Visual Studio 17 2022" -A x64 -B build -DDD_WIN_PROF_BUILD_OBFUSCATION=ON -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.deps

    - name: Build obfuscation tools
      run: |
        cmake --build build --config ${{ matrix.configuration }} --target ObfSymbols
        cmake --build build --config ${{ matrix.configuration }} --target TestSymbolsDll
        cmake --build build --config ${{ matrix.configuration }} --target TestSymbols

    - name: Run tests
      run: |
        cd obfuscation
        .\test.ps1 -Configuration ${{ matrix.configuration }} -BuildDir ..\build
      shell: pwsh
      continue-on-error: false

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: obfuscation-artifacts-${{ matrix.configuration }}-x64
        path: |
          build/obfuscation/ObfSymbols/${{ matrix.configuration }}/ObfSymbols.exe
          build/obfuscation/ObfSymbols/${{ matrix.configuration }}/ObfSymbols.pdb
          build/obfuscation/TestSymbols/${{ matrix.configuration }}/TestSymbols.exe
          build/obfuscation/TestSymbols/${{ matrix.configuration }}/TestSymbols.pdb
          build/obfuscation/TestSymbolsDll/${{ matrix.configuration }}/TestSymbolsDll.dll
          build/obfuscation/TestSymbolsDll/${{ matrix.configuration }}/TestSymbolsDll.pdb
          build/obfuscation/TestSymbolsDll/${{ matrix.configuration }}/*.sym
        retention-days: 7
        if-no-files-found: warn

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: test-results-${{ matrix.configuration }}-x64
        path: |
          build/obfuscation/TestSymbolsDll/${{ matrix.configuration }}/*.sym
        retention-days: 7
        if-no-files-found: ignore
