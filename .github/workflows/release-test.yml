name: Test Latest Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to test (e.g., v0.3.0)'
        required: false
        type: string
        default: 'v0.3.0'
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday at 8am UTC

jobs:
  test-release:
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Determine release to test
      id: release
      shell: pwsh
      run: |
        $tag = "${{ inputs.release_tag }}"
        if ([string]::IsNullOrWhiteSpace($tag)) {
          # Default to v0.3.0 for testing
          $tag = "v0.3.0"
        }
        Write-Host "Testing release: $tag"
        echo "tag=$tag" >> $env:GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ github.token }}
          
    - name: Download release artifacts
      shell: pwsh
      run: |
        $tag = "${{ steps.release.outputs.tag }}"
        Write-Host "Downloading release $tag (including draft releases)..."
        
        New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
        # Note: gh release download works with draft releases when you have write access
        gh release download $tag --dir release-artifacts
        
        Write-Host "`nExtracting archives..."
        Get-ChildItem release-artifacts -Filter "*.zip" | ForEach-Object {
          Write-Host "Extracting: $($_.Name)"
          Expand-Archive -Path $_.FullName -DestinationPath "release-artifacts" -Force
        }
        
        Write-Host "`nRelease contents:"
        Get-ChildItem -Recurse release-artifacts -Include "*.dll","*.lib","*.pdb","*.h" | Select-Object -ExpandProperty Name | Sort-Object -Unique
      env:
        GH_TOKEN: ${{ github.token }}
      
    - name: Setup src/reference with release artifacts
      shell: pwsh
      run: |
        Write-Host "Setting up src/reference/ for Runner build..."
        
        # Find the release artifacts (should be in profiler-artifacts-x64/)
        $profilerDll = Get-ChildItem -Recurse release-artifacts -Filter "dd-win-prof.dll" | Select-Object -First 1
        $profilerLib = Get-ChildItem -Recurse release-artifacts -Filter "dd-win-prof.lib" | Select-Object -First 1
        $profilerPdb = Get-ChildItem -Recurse release-artifacts -Filter "dd-win-prof.pdb" | Select-Object -First 1
        $profilerH = Get-ChildItem -Recurse release-artifacts -Filter "dd-win-prof.h" | Select-Object -First 1
        $datadogDll = Get-ChildItem -Recurse release-artifacts -Filter "datadog_profiling_ffi.dll" | Select-Object -First 1
        $datadogPdb = Get-ChildItem -Recurse release-artifacts -Filter "datadog_profiling_ffi.pdb" | Select-Object -First 1
        
        if (-not $profilerDll -or -not $profilerLib -or -not $profilerH) {
          Write-Error "Missing required release artifacts"
          exit 1
        }
        
        # Create src/reference directory structure
        New-Item -ItemType Directory -Force -Path "src/reference" | Out-Null
        New-Item -ItemType Directory -Force -Path "src/dd-win-prof" | Out-Null
        
        # Copy files
        Copy-Item $profilerDll.FullName -Destination "src/reference/" -Force
        Copy-Item $profilerLib.FullName -Destination "src/reference/" -Force
        if ($profilerPdb) { Copy-Item $profilerPdb.FullName -Destination "src/reference/" -Force }
        Copy-Item $profilerH.FullName -Destination "src/dd-win-prof/" -Force
        
        if ($datadogDll) { Copy-Item $datadogDll.FullName -Destination "src/reference/" -Force }
        if ($datadogPdb) { Copy-Item $datadogPdb.FullName -Destination "src/reference/" -Force }
        
        Write-Host "Copied release artifacts to src/reference/"
        Get-ChildItem src/reference/ | Select-Object Name

    - name: Configure CMake
      run: cmake -G "Visual Studio 17 2022" -A x64 -B build

    - name: Build Runner
      run: cmake --build build --config Release --target Runner

    - name: Verify Runner build
      shell: pwsh
      run: |
        $runner = "build/src/Runner/Release/Runner.exe"
        if (-not (Test-Path $runner)) {
          Write-Error "Runner.exe not found at $runner"
          exit 1
        }
        Write-Host "Runner built successfully: $runner"
        Write-Host "Size: $([math]::Round((Get-Item $runner).Length / 1KB, 2)) KB"
        
    - name: Run release tests
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        
        Write-Host "`n========================================" -ForegroundColor Cyan
        Write-Host "Release Test Suite - ${{ steps.release.outputs.tag }}" -ForegroundColor Cyan
        Write-Host "========================================`n" -ForegroundColor Cyan
        
        # Set up environment
        $workspace = "test-workspace"
        New-Item -ItemType Directory -Force -Path $workspace | Out-Null
        
        # Copy Runner and DLLs to workspace
        Copy-Item build/src/Runner/Release/Runner.exe -Destination $workspace/ -Force
        Copy-Item src/reference/*.dll -Destination $workspace/ -Force
        
        Push-Location $workspace
        
        $env:DD_PROFILING_ENABLED = "1"
        $env:DD_PROFILING_EXPORT_ENABLED = "0"
        $env:DD_INTERNAL_PROFILING_OUTPUT_DIR = (Get-Location).Path
        $env:DD_PROFILING_LOG_LEVEL = "info"
        
        $testsPassed = 0
        $testsFailed = 0
        
        # Test 1: Basic setup
        Write-Host "`nTest 1: SetupProfiler with metadata" -ForegroundColor Yellow
        try {
          .\Runner.exe --scenario 1 --iterations 1 --name "release-test" --env "ci" --version "${{ steps.release.outputs.tag }}"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "✓ SetupProfiler test passed" -ForegroundColor Green
            $testsPassed++
          } else {
            Write-Host "✗ SetupProfiler test failed (exit code: $LASTEXITCODE)" -ForegroundColor Red
            $testsFailed++
          }
        } catch {
          Write-Host "✗ SetupProfiler test failed: $($_.Exception.Message)" -ForegroundColor Red
          $testsFailed++
        }
        
        # Test 2: Multiple scenarios
        Write-Host "`nTest 2: Multiple profiling scenarios" -ForegroundColor Yellow
        $scenarios = @(
          @{num=2; name="C++ class calls"},
          @{num=3; name="Multi-threaded"}
        )
        
        foreach ($scn in $scenarios) {
          Write-Host "  Running: $($scn.name)..."
          try {
            .\Runner.exe --scenario $scn.num --iterations 1 --name "scenario-$($scn.num)" --env "ci" 2>&1 | Out-Null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "  ✓ $($scn.name)" -ForegroundColor Green
              $testsPassed++
            } else {
              Write-Host "  ✗ $($scn.name) (exit code: $LASTEXITCODE)" -ForegroundColor Red
              $testsFailed++
            }
          } catch {
            Write-Host "  ✗ $($scn.name): $($_.Exception.Message)" -ForegroundColor Red
            $testsFailed++
          }
        }
        
        # Test 3: Lock contention
        Write-Host "`nTest 3: Lock contention profiling" -ForegroundColor Yellow
        try {
          .\Runner.exe --scenario 4 --iterations 1 --name "lock-test" --env "ci" 2>&1 | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "✓ Lock contention test passed" -ForegroundColor Green
            $testsPassed++
          } else {
            Write-Host "✗ Lock contention test failed (exit code: $LASTEXITCODE)" -ForegroundColor Red
            $testsFailed++
          }
        } catch {
          Write-Host "✗ Lock contention test failed: $($_.Exception.Message)" -ForegroundColor Red
          $testsFailed++
        }
        
        # Check for profile output
        Write-Host "`nTest 4: Profile output verification" -ForegroundColor Yellow
        $pprofFiles = Get-ChildItem -Filter "*.pprof"
        if ($pprofFiles.Count -gt 0) {
          Write-Host "✓ Found $($pprofFiles.Count) profile file(s)" -ForegroundColor Green
          $pprofFiles | ForEach-Object { 
            Write-Host "  - $($_.Name) ($([math]::Round($_.Length/1KB, 2)) KB)" 
          }
          $testsPassed++
        } else {
          Write-Host "⚠ No .pprof files found (profiles may have been uploaded)" -ForegroundColor Yellow
        }
        
        Pop-Location
        
        # Summary
        Write-Host "`n========================================" -ForegroundColor Cyan
        Write-Host "Test Results Summary" -ForegroundColor Cyan
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Passed: $testsPassed" -ForegroundColor Green
        Write-Host "Failed: $testsFailed" -ForegroundColor $(if ($testsFailed -eq 0) { "Green" } else { "Red" })
        
        if ($testsFailed -gt 0) {
          Write-Host "`nTests FAILED" -ForegroundColor Red
          exit 1
        } else {
          Write-Host "`nAll tests PASSED" -ForegroundColor Green
        }
      
    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: release-test-results-${{ steps.release.outputs.tag }}
        path: |
          test-workspace/**/*.pprof
          test-workspace/**/*.log
        retention-days: 7
